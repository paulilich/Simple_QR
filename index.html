<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="image.png">
    <title>Simple QR</title>
</head>
<body>
    <main>
        <div class="main__header">
            <h1 id="update">Simple QR</h1>
            <nav>
                <a id="header__url">url</a>
                <a id="header__text">text</a>
                <a id="header__phone">phone</a>
                <a id="header__telegram">telegram</a>
            </nav>
        </div>

        <hr>


        <section>
            <div class="block">
                <h2 class="instruction">Enter text and click generate</h2>


                <div class="elements">
                    <div id="element__url">
                        <input class="standart__input" type="text" placeholder="https://">
                    </div>

                    <div id="element__text">
                        <textarea class="standart__input" type="text" placeholder="Here your text"></textarea>
                    </div>

                    <div id="element__phone">
                        <input class="phone__input" type="text" placeholder="+19999999999">
                    </div>

                    <div id="element__telegram">
                        <input class="phone__telegram" type="text" placeholder="@usename">
                    </div>




                    <div class="control">
                        <button id="clean">Clean</button>
                        <button id="generate">Generate</button>
                    </div>




                </div>


            </div>
            

            <div class="block">
                <div id="codeqr">
                    <img src="image.png">
                </div>
                
                <div class="control">
                    <button id="download">Download</button>
                </div>

            </div>

        </section>

        <hr>

        <div class="main__footer">
            <p>Plat Ilich</p>
            <a id="github">GitHub</a>

        </div>



    <script src="script.js"></script>

    <script src="buttons.js"></script>
    <script src="download.js"></script>

</body>
</html>
